name: Deploy (Core + Agents)

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Optional comma-separated services to deploy (overrides auto-detect)"
        required: false
        default: ""
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      services_csv: ${{ steps.detect.outputs.services_csv }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed deployable services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          INPUT_SERVICES="${{ github.event.inputs.services || '' }}"
          if [[ -n "$INPUT_SERVICES" ]]; then
            echo "services_csv=$INPUT_SERVICES" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="$(git rev-list --max-count=1 HEAD~1)"
            HEAD_SHA="${{ github.sha }}"
          fi

          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          printf 'Changed files:\n%s\n' "${CHANGED[@]:-<none>}"

          declare -A SERVICES=()
          for file in "${CHANGED[@]}"; do
            case "$file" in
              apps/core/*|compose.core.yaml)
                SERVICES[core]=1
                ;;
              apps/hello-agent/*|compose.agent-hello.yaml)
                SERVICES[hello-agent]=1
                ;;
              apps/knowledge-agent/*|compose.agent-knowledge.yaml)
                SERVICES[knowledge-agent]=1
                SERVICES[knowledge-worker]=1
                ;;
              apps/news-maker-agent/*|compose.agent-news-maker.yaml)
                SERVICES[news-maker-agent]=1
                ;;
            esac
          done

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "services_csv=" >> "$GITHUB_OUTPUT"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t ORDERED < <(printf '%s\n' "${!SERVICES[@]}" | sort)
          CSV="$(IFS=,; echo "${ORDERED[*]}")"

          echo "services_csv=$CSV" >> "$GITHUB_OUTPUT"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: detect-services
    if: needs.detect-services.outputs.should_deploy == 'true'
    environment: production
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy changed services
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_PATH: ${{ secrets.APP_PATH }}
          SERVICES_CSV: ${{ needs.detect-services.outputs.services_csv }}
        run: |
          set -euo pipefail
          if [[ -z "${APP_PATH:-}" ]]; then
            APP_PATH="/root/app/ai-community-platform"
          fi

          REMOTE_SERVICES="${SERVICES_CSV//,/ }"
          echo "Deploying services: ${REMOTE_SERVICES}"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            cd '$APP_PATH'
            git fetch --all
            git checkout main
            git pull --ff-only
            docker compose -f compose.yaml -f compose.core.yaml -f compose.agent-hello.yaml -f compose.agent-knowledge.yaml -f compose.agent-news-maker.yaml up -d --build --no-deps ${REMOTE_SERVICES}
            docker compose -f compose.yaml -f compose.core.yaml -f compose.agent-hello.yaml -f compose.agent-knowledge.yaml -f compose.agent-news-maker.yaml ps
          "
