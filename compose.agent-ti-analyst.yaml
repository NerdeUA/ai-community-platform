services:
  ti-analyst-agent:
    build:
      context: .
      dockerfile: docker/ti-analyst/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.ti-analyst-agent.rule=PathPrefix(`/`)
      - traefik.http.routers.ti-analyst-agent.entrypoints=ti-analyst
      - traefik.http.routers.ti-analyst-agent.middlewares=edge-auth@docker
      - traefik.http.services.ti-analyst-agent.loadbalancer.server.port=8000
      - ai.platform.agent=true
    env_file:
      - path: ./.env.local
        required: false
    environment:
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://ti_analyst:ti_analyst@postgres:5432/ti_analyst
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: dev-key
      TRIAGE_MODEL: free
      ANALYST_MODEL: cheap
      INFRA_MODEL: free
      PLATFORM_CORE_URL: http://core
      APP_INTERNAL_TOKEN: dev-internal-token
      OPENSEARCH_URL: http://opensearch:9200
      OPENCLAW_URL: http://openclaw:8000
      ADMIN_PUBLIC_URL: http://localhost:8088/admin/sources
    volumes:
      - ./apps/ti-analyst:/app
    depends_on:
      - postgres
      - litellm
      - opensearch
    networks:
      - dev-edge

  ti-analyst-agent-e2e:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/ti-analyst/Dockerfile
    environment:
      MIGRATE_ON_START: "1"
      DATABASE_URL: postgresql://ti_analyst:ti_analyst@postgres:5432/ti_analyst_test
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: dev-key
      TRIAGE_MODEL: free
      ANALYST_MODEL: cheap
      INFRA_MODEL: free
      PLATFORM_CORE_URL: http://core-e2e
      APP_INTERNAL_TOKEN: dev-internal-token
      OPENSEARCH_URL: http://opensearch:9200
      OPENCLAW_URL: http://openclaw:8000
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_ALERT_CHAT_ID: ""
      ADMIN_PUBLIC_URL: http://localhost:18088/admin/sources
      ENABLE_TEST_ENDPOINTS: "1"
    ports:
      - "18088:8000"
    volumes:
      - ./apps/ti-analyst:/app
    depends_on:
      - postgres
      - litellm
      - opensearch
    networks:
      - dev-edge
